<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Free Strategy Call — ResumeReady.ai</title>
  <link rel="stylesheet" href="/assets/css/site.css" />
</head>
<body>
<div class="header-wrap">
<header>
  <a class="logo" href="/">Resume<span>Ready</span>.ai</a>
  <nav>
    <a href="/">Home</a>
    <a href="/book.html">Book a Call</a>
  </nav>
</header>
</div>

<section class="product-hero">
  <h1>Book a Free Strategy Call</h1>
  <p>Not sure which package is right for you? Let's talk. We'll review your situation and recommend the best path forward — no pressure, no obligation.</p>
</section>

<div class="form-wrap">
  <h2>Schedule Your Call</h2>
  <form action="/thank-you.html" method="GET">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" required placeholder="Jane Smith" />

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required placeholder="jane@example.com" />

    <label for="role">Target Role or Industry</label>
    <input type="text" id="role" name="role" placeholder="e.g. Product Manager, Fintech" />

    <label for="notes">Anything else we should know?</label>
    <textarea id="notes" name="notes" rows="4" placeholder="Tell us about your situation..."></textarea>

    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Book My Free Call</button>
  </form>
</div>

<footer>
  <p>&copy; 2026 ResumeReady.ai &mdash; All rights reserved.</p>
</footer>
</body>
</html>
